<!DOCTYPE html>
<html lang="en">
 <head>
    <meta charset="UTF-8">
    <title>pbj</title>
    <link rel="stylesheet" href="styles.css">
</head>
 <body>
    <h1>Peanutbutter and Jelly</h1>
    <img src="../images1/pbj.jpg" alt="Peanutbutter Time">
    
    
    <h3>Ingredients</h3>
    <ul>
        <li>2 slices White Bread</li>
        <li>Peanut Butter</li>
        <li>Fruit Jelly</li>
    </ul>

    <h3>Directions</h3>
    <ol>
        <li>Grab Two Slices of bread</li>
        <li>Spread Peanut butter on both slices</li>
        <li>Spread Fruit jelly on top of Peanut Butter </li>
        <li>Sandwich both Slices together</li>
        <li><strong>BOOM!!!!</strong></li>
    </ol>
 </body>
</html>
